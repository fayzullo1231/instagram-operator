{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kirish | Kulol Optom</title>
  <link rel="stylesheet" href="{% static 'panel/style.css' %}">
</head>
<body>
  <div class="login-page">
    <div class="card login-card">
      <h1 class="page-title" style="margin-bottom:0.25rem">Admin Panel</h1>
      <p style="color:var(--muted);margin-bottom:1.5rem">Kulol Optom Instagram operatori</p>
      {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label">Login</label>
          <input type="text" name="username" class="form-input" required autofocus>
        </div>
        <div class="form-group">
          <label class="form-label">Parol</label>
          <input type="password" name="password" class="form-input" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">Kirish</button>
      </form>
    </div>
  </div>
</body>
</html>
