{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Admin Panel{% endblock %} | Kulol Optom</title>
  <link rel="stylesheet" href="{% static 'panel/style.css' %}">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand">Kulol <span>Optom</span></div>
      <nav>
        <a href="{% url 'panel_dashboard' %}" class="nav-link {% if request.resolver_match.url_name == 'panel_dashboard' %}active{% endif %}">📊 Bosh sahifa</a>
        <a href="{% url 'panel_video_list' %}" class="nav-link {% if 'video' in request.resolver_match.url_name %}active{% endif %}">🎬 Videolar / Postlar</a>
        <a href="{% url 'panel_rule_list' %}" class="nav-link {% if 'rule' in request.resolver_match.url_name %}active{% endif %}">💬 Izoh qoidalari</a>
        <a href="{% url 'panel_product_list' %}" class="nav-link {% if 'product' in request.resolver_match.url_name %}active{% endif %}">📦 Mahsulotlar</a>
        <a href="{% url 'panel_logout' %}" class="nav-link" style="margin-top:2rem">🚪 Chiqish</a>
      </nav>
    </aside>
    <main class="main">
      {% if messages %}
      <div class="messages">
        {% for message in messages %}
        <div class="alert alert-{% if message.tags == 'error' %}error{% else %}success{% endif %}">{{ message }}</div>
        {% endfor %}
      </div>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
